name: Binary Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: binary-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: 05a03973c3048b4d98d22cb29a55837f62594c12
  REGISTRY_MANIFEST_REPOSITORY: jeremi/registry-manifest
  REGISTRY_MANIFEST_REF: a2e648aaac864563a3311b9d95b8143afa1b7334
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 54e0f537830837fcd0c9efa87990987b1846931c

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive_ext: tar.xz
            bin_ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_ext: tar.xz
            bin_ext: ""
          - target: x86_64-apple-darwin
            runner: macos-13
            archive_ext: tar.xz
            bin_ext: ""
          - target: aarch64-apple-darwin
            runner: macos-15
            archive_ext: tar.xz
            bin_ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive_ext: zip
            bin_ext: ".exe"
    defaults:
      run:
        shell: bash
        working-directory: registry-relay
    steps:
      - name: Checkout registry-relay
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: registry-relay
          persist-credentials: false

      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          path: registry-platform
          persist-credentials: false

      - name: Checkout registry-manifest
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.REGISTRY_MANIFEST_REPOSITORY }}
          ref: ${{ env.REGISTRY_MANIFEST_REF }}
          token: ${{ secrets.REGISTRY_MANIFEST_TOKEN || github.token }}
          path: registry-manifest
          persist-credentials: false

      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke binary startup
        run: |
          set +e
          "target/release/registry-relay${{ matrix.bin_ext }}" --config __missing_release_smoke_config.yaml > target/release-smoke.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "registry-relay unexpectedly succeeded with a missing config" >&2
            exit 1
          fi

      - name: Package archive
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release binary tags must be stable semver tags like v0.1.2." >&2
              exit 1
            fi
          else
            version="manual-${GITHUB_RUN_NUMBER}"
          fi
          package="registry-relay-${version}-${TARGET}"
          package_dir="target/dist/${package}"
          mkdir -p "$package_dir"
          cp "target/release/registry-relay${BIN_EXT}" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          if [ "$ARCHIVE_EXT" = "zip" ]; then
            PACKAGE_DIR="$package_dir" PACKAGE_ZIP="target/dist/${package}.zip" \
              pwsh -NoProfile -Command "Compress-Archive -Path (Join-Path \$env:PACKAGE_DIR '*') -DestinationPath \$env:PACKAGE_ZIP -Force"
          else
            tar -C target/dist -cJf "target/dist/${package}.tar.xz" "$package"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-relay-${{ matrix.target }}
          path: registry-relay/target/dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.xz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum ./* > SHA256SUMS
          ls -la

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" release/* --verify-tag --title "$TAG" --notes "Binary release for $TAG."
          fi
